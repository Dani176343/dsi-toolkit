name: Build & Release

on:
  push:
    tags:
      - 'v*'          # dispara ao criar tag: git tag v0.2.0 && git push --tags
  workflow_dispatch:  # ou manualmente no GitHub

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DSI Toolkit ${{ github.ref_name }}'
          releaseBody: |
            ## O que há de novo
            Vê os commits para detalhes.

            ## Instalação / Atualização
            - **Windows**: `DSI Toolkit_*_x64-setup.exe`
            - **Linux (Debian/Ubuntu)**: `dsi-toolkit_*_amd64.deb`
            - **Linux (outros)**: `dsi-toolkit_*_amd64.AppImage`
            - **macOS Apple Silicon**: `DSI Toolkit_*_aarch64.dmg`
            - **macOS Intel**: `DSI Toolkit_*_x64.dmg`

            > Se já tens a app instalada, ela vai atualizar automaticamente.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
