name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. Cria a release como rascunho ─────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Criar release (rascunho)
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `DSI Toolkit ${tag}`,
              body: [
                '## O que há de novo',
                'Vê os commits para detalhes.',
                '',
                '## Instalação / Atualização',
                '- **Windows**: `DSI Toolkit_*_x64-setup.exe`',
                '- **Linux (Debian/Ubuntu)**: `dsi-toolkit_*_amd64.deb`',
                '- **Linux (outros)**: `dsi-toolkit_*_amd64.AppImage`',
                '- **macOS**: `DSI Toolkit_*_aarch64.dmg`',
                '',
                '> Se já tens a app instalada, ela vai actualizar automaticamente.',
              ].join('\n'),
              draft: true,
              prerelease: false
            })
            return data.id

  # ── 2. Build por plataforma (em paralelo) ───────────────────────────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & upload artefactos
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false

  # ── 3. Gera latest.json e publica ───────────────────────────────────────────
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Gerar latest.json e publicar release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = Number(${{ needs.create-release.outputs.release_id }})
            const tag = context.ref.replace('refs/tags/', '')
            const version = tag.replace('v', '')

            // Vai buscar todos os assets do release
            const assets = await github.paginate(
              github.rest.repos.listReleaseAssets,
              { owner: context.repo.owner, repo: context.repo.repo, release_id: releaseId }
            )

            console.log('Assets encontrados:', assets.map(a => a.name))

            const platforms = {}

            for (const asset of assets) {
              if (!asset.name.endsWith('.sig')) continue

              const archiveName = asset.name.replace('.sig', '')
              const archive = assets.find(a => a.name === archiveName)
              if (!archive) continue

              // Descarrega a assinatura
              const resp = await fetch(asset.browser_download_url)
              const signature = (await resp.text()).trim()
              const url = archive.browser_download_url

              // No Tauri v2 os artefactos de updater são os próprios instaladores
              if (archiveName.endsWith('-setup.exe')) {
                platforms['windows-x86_64-nsis'] = { signature, url }
              } else if (archiveName.endsWith('.msi')) {
                platforms['windows-x86_64-msi'] = { signature, url }
              } else if (archiveName.endsWith('.AppImage')) {
                platforms['linux-x86_64'] = { signature, url }
              } else if (archiveName.endsWith('.app.tar.gz')) {
                if (archiveName.includes('aarch64')) {
                  platforms['darwin-aarch64'] = { signature, url }
                } else {
                  platforms['darwin-x86_64'] = { signature, url }
                }
              }
            }

            console.log('Plataformas detectadas:', Object.keys(platforms))

            if (Object.keys(platforms).length === 0) {
              core.warning('Nenhuma plataforma detectada nos .sig. Verifica os logs dos jobs de build.')
            }

            const latestJson = JSON.stringify({
              version,
              notes: 'Nova versão disponível',
              pub_date: new Date().toISOString(),
              platforms
            }, null, 2)

            // Remove latest.json pré-existente (criado por jobs anteriores) se houver
            const existing = assets.find(a => a.name === 'latest.json')
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id
              })
            }

            // Upload latest.json
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'latest.json',
              data: latestJson,
              headers: { 'content-type': 'application/json' }
            })

            // Publica o release (tira de rascunho)
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false
            })

            console.log(`Release ${tag} publicada com sucesso!`)
